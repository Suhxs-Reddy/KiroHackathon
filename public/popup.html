<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Tool Settings</title>
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .message {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .info {
      margin-top: 16px;
      padding: 12px;
      background: #e7f3ff;
      border-radius: 4px;
      font-size: 12px;
      color: #004085;
    }
  </style>
</head>
<body>
  <h2>🔒 Privacy Tool Settings</h2>
  
  <div class="form-group">
    <label for="adapter-type">AI Model Provider:</label>
    <select id="adapter-type">
      <option value="saulm">SaulLM (HuggingFace) - Legal-specialized</option>
      <option value="openai">OpenAI GPT-4o</option>
    </select>
  </div>

  <div class="form-group">
    <label for="api-key">API Key:</label>
    <input type="password" id="api-key" placeholder="Enter your API key">
  </div>

  <button id="save-btn">Save & Validate</button>

  <div id="message" class="message"></div>

  <div class="info">
    <strong>Note:</strong> Your API key is stored locally in your browser and never sent to any server except the AI provider you selected.
  </div>

  <script type="module" src="../dist/popup.js"></script>
</body>
</html>
